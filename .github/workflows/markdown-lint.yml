name: Validate Markdown

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/markdown.links.config.json'
      - '.github/workflows/markdown-lint.yml'
      - '.markdownlint-cli2.jsonc'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    # Run at 00:00 UTC on the first day of every month.
    - cron: '0 0 1 * *'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/markdown.links.config.json'
      - '.github/workflows/markdown-lint.yml'
      - '.markdownlint-cli2.jsonc'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

concurrency:
  group: markdown-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
      - name: Install pinned markdown tooling
        run: |
          npm ci
      - name: Run markdown quality checks
        run: npm run validate

  markdown-link-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1.1.2
        with:
          retry-after: 10
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/workflows/markdown.links.config.json'
