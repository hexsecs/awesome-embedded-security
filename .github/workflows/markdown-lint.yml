name: Validate Markdown

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/markdown.links.config.json'
      - '.github/workflows/markdown-lint.yml'
      - '.markdownlint-cli2.jsonc'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    # Run at 00:00 UTC on the first day of every month.
    - cron: '0 0 1 * *'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/markdown.links.config.json'
      - '.github/workflows/markdown-lint.yml'
      - '.markdownlint-cli2.jsonc'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

concurrency:
  group: markdown-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: npm
      - name: Install pinned markdown tooling
        run: |
          npm ci
      - name: Run markdown quality checks
        run: npm run validate

  markdown-link-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gaurav-nelson/github-action-markdown-link-check@499c1e7f3637c131334fa8e937c45144f79d72d2 # v1
        with:
          retry-after: 10
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/workflows/markdown.links.config.json'
